services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.node.dev
    ports:
      - "3000:3000"
    volumes:
      - "${HOME}/.claude.json:/root/.claude.json:ro"
      - "${HOME}/.claude/.credentials.json:/root/.claude/.credentials.json:ro"
      - .:/app
      - node_modules:/app/node_modules
      - ./data:/app/data
    environment:
      - PYTHON_SIDECAR_URL=http://python:5001
    depends_on:
      python:
        condition: service_healthy
    restart: unless-stopped

  python:
    build:
      context: .
      dockerfile: Dockerfile.python
    volumes:
      - ./data:/app/data
    expose:
      - "5001"
    restart: unless-stopped

volumes:
  node_modules:
