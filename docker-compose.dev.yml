services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.node.dev
    ports:
      - "3000:3000"
    volumes:
      - "${HOME}/.claude.json:/root/.claude.json:ro"
      - "${HOME}/.claude/.credentials.json:/root/.claude/.credentials.json:ro"
      - .:/app
      - node_modules:/app/node_modules
      - ./data:/app/data
    restart: unless-stopped

volumes:
  node_modules:
