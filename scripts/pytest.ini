[pytest]
filterwarnings =
    # PyMuPDF (fitz) uses SWIG-generated C++ bindings; Python 3.12+ emits
    # DeprecationWarning for SWIG built-in types missing __module__.
    # This is a known upstream issue in the SWIG/PyMuPDF package — not our code.
    ignore::DeprecationWarning:fitz
    ignore:builtin type Swig.*has no __module__:DeprecationWarning
    ignore:builtin type swigvarlink.*has no __module__:DeprecationWarning
